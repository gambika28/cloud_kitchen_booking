{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="p-4 bg-light rounded-3 mb-4">
  <h2>Welcome, {{ current_user.name }} 👋</h2>
  <p class="text-muted">Pick a delivery date to view available slots.</p>
</div>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="get" action="{{ url_for('main.slots') }}" class="row g-3 align-items-end">
      <div class="col-md-6">
        <label class="form-label">Delivery Date</label>
        <input type="date" name="date" min="{{ today }}" max="{{ max_date }}" value="{{ today }}" class="form-control" required>
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100">View Slots</button>
      </div>
      <div class="col-md-3">
        <a class="btn btn-outline-secondary w-100" href="{{ url_for('main.history') }}">My Bookings</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
